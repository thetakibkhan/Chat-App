{% extends 'base/main.html' %}
{%load static%}

{%block content%}
<header id="room-header">
    <span id="room-title">Room: <span id="room-name"></span></span>
    <span id="user-display"></span>
</header>

<main>
    <section id="video-streams"></section>

    <section id="controls-wrapper">
        <button class="ctrl-btn" id="mic-btn" title="Toggle Mic">
            <svg id="mic-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4z"/>
                <path d="M19 10a7 7 0 0 1-14 0"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
            <span class="ctrl-label">Mute</span>
        </button>

        <button class="ctrl-btn" id="camera-btn" title="Toggle Camera">
            <svg id="cam-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 7l-7 5 7 5V7z"/>
                <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
            </svg>
            <span class="ctrl-label">Video</span>
        </button>

        <button class="ctrl-btn ctrl-btn--danger" id="leave-btn" title="Leave Room">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            <span class="ctrl-label">Leave</span>
        </button>
    </section>
</main>

<script type="text/javascript" src="{% static 'assets/AgoraRTC_N-4.24.0.js'%}"></script>
<script type="text/javascript" src="{% static 'js/streams.js' %}"></script>
<script>
    const displayName = sessionStorage.getItem('username') || ''
    if (displayName) {
        document.getElementById('user-display').textContent = displayName
        document.getElementById('user-display').style.cssText = 'font-size:13px;color:#7b82a8;font-weight:500;'
    }
</script>
{%endblock content%}
